function renderProducts() {
  let productGrid = document.getElementById("productGrid");
  let searchValue = document.getElementById("searchInput").value.toLowerCase();
  productGrid.innerHTML = "";

  let filteredProducts = products.filter(product => {
    let matchSearch =
      product.name.toLowerCase().includes(searchValue) ||
      product.brand.toLowerCase().includes(searchValue) ||
      product.code.toLowerCase().includes(searchValue);

    let matchCategory = selectedCategory === "All" || product.category === selectedCategory;
    return matchSearch && matchCategory;
  });

  filteredProducts.forEach(product => {
    let finalPrice = Math.round(product.price - (product.price * product.discount / 100));

    productGrid.innerHTML += `
      <div class="bg-white rounded-2xl shadow-lg hover:shadow-2xl hover:scale-105 transition-all duration-300 p-4 border relative">
        <span class="absolute top-3 left-3 bg-red-500 text-white text-xs px-2 py-1 rounded-full font-bold">
          ${product.discount}% OFF
        </span>

        <div class="bg-purple-50 rounded-xl p-3 mb-3 mt-4">
          <img src="${product.image}"
          onerror="this.onerror=null;this.src='https://cdn-icons-png.flaticon.com/512/3081/3081559.png';"
          class="w-24 h-24 object-contain mx-auto">
        </div>

        <h3 class="font-bold text-lg text-center">${product.name}</h3>
        <p class="text-xs text-gray-500 text-center">${product.brand}</p>
        <p class="text-xs text-gray-400 text-center">${product.code}</p>

        <div class="flex justify-between items-center mt-3">
          <span class="bg-blue-100 text-blue-700 px-2 py-1 rounded-full text-xs font-semibold">
            ${product.category}
          </span>
          <span class="bg-green-100 text-green-700 px-2 py-1 rounded-full text-sm font-bold">
            ₹${finalPrice}
          </span>
        </div>

        <p class="text-center mt-2 text-xs text-gray-400 line-through">MRP ₹${product.price}</p>
        <p class="text-center mt-1 text-sm">Stock: <b>${product.stock}</b></p>
        <p class="text-center mt-1 text-xs font-semibold ${product.warranty === 'No Warranty' ? 'text-gray-400' : 'text-purple-700'}">
          ${product.warranty}
        </p>

        <button onclick="addToCart(${product.id})"
        class="mt-3 bg-purple-700 text-white px-3 py-2 w-full rounded-xl hover:bg-purple-800 font-semibold">
        Add To Cart
        </button>
      </div>`;
  });
}

function addToCart(id) {
  let product = products.find(p => p.id === id);
  if (product.stock <= 0) {
    alert("Out of Stock");
    return;
  }

  let finalPrice = Math.round(product.price - (product.price * product.discount / 100));
  let cartItem = cart.find(item => item.id === id);

  if (cartItem) cartItem.qty++;
  else {
    cart.push({
      id: product.id,
      name: product.name,
      code: product.code,
      brand: product.brand,
      price: finalPrice,
      originalPrice: product.price,
      discount: product.discount,
      warranty: product.warranty,
      qty: 1
    });
  }

  product.stock--;
  renderProducts();
  renderCart();
}

function increaseQty(id) {
  let product = products.find(p => p.id === id);
  let cartItem = cart.find(item => item.id === id);

  if (product.stock <= 0) {
    alert("No more stock available");
    return;
  }

  cartItem.qty++;
  product.stock--;
  renderProducts();
  renderCart();
}

function decreaseQty(id) {
  let product = products.find(p => p.id === id);
  let cartItem = cart.find(item => item.id === id);

  cartItem.qty--;
  product.stock++;

  if (cartItem.qty <= 0) cart = cart.filter(item => item.id !== id);

  renderProducts();
  renderCart();
}

function renderCart() {
  let cartDiv = document.getElementById("cart");
  cartDiv.innerHTML = "";

  let subtotal = 0;
  let discountAmount = 0;

  if (cart.length === 0) {
    cartDiv.innerHTML = `
      <div class="text-center text-gray-400 mt-20">
        <p class="text-5xl">🛒</p>
        <p>No items added yet</p>
      </div>`;
  }

  cart.forEach(item => {
    let itemTotal = item.price * item.qty;
    let itemOriginalTotal = item.originalPrice * item.qty;
    subtotal += itemOriginalTotal;
    discountAmount += itemOriginalTotal - itemTotal;

    cartDiv.innerHTML += `
      <div class="border rounded-xl p-3 mb-3 bg-gray-50">
        <div class="flex justify-between">
          <div>
            <h3 class="font-bold">${item.name}</h3>
            <p class="text-xs text-gray-500">${item.brand} | ${item.code}</p>
            <p class="text-xs ${item.warranty === 'No Warranty' ? 'text-gray-400' : 'text-purple-700'}">${item.warranty}</p>
          </div>
          <p class="font-bold text-green-700">₹${itemTotal}</p>
        </div>

        <div class="flex justify-between items-center mt-3">
          <p>₹${item.price} × ${item.qty}</p>
          <div class="flex gap-2">
            <button onclick="decreaseQty(${item.id})" class="bg-red-100 text-red-600 px-3 py-1 rounded-lg font-bold">-</button>
            <span class="px-2 py-1 font-bold">${item.qty}</span>
            <button onclick="increaseQty(${item.id})" class="bg-green-100 text-green-600 px-3 py-1 rounded-lg font-bold">+</button>
          </div>
        </div>
      </div>`;
  });

  let afterDiscount = subtotal - discountAmount;
  let gst = afterDiscount * 0.05;
  let total = afterDiscount + gst;

  document.getElementById("subtotal").innerText = subtotal.toFixed(2);
  document.getElementById("discount").innerText = discountAmount.toFixed(2);
  document.getElementById("gst").innerText = gst.toFixed(2);
  document.getElementById("total").innerText = total.toFixed(2);
}

    <hr class="my-4">
    <div class="space-y-3">
      ${bill.items.map(item => `<div class="border rounded-xl p-3 bg-gray-50"><div class="flex justify-between"><b>${item.name}</b><b>₹${item.lineTotal}</b></div><p class="text-xs text-gray-500">${item.brand} | ${item.code}</p><p class="text-xs ${item.warranty === 'No Warranty' ? 'text-gray-400' : 'text-purple-700'}">${item.warranty}</p><p class="text-xs">₹${item.price} × ${item.qty}</p></div>`).join("")}
    </div>
    <hr class="my-4">
    <div class="space-y-2 text-lg">
      <div class="flex justify-between"><span>Subtotal</span><b>₹${bill.subtotal}</b></div>
      <div class="flex justify-between"><span>Discount</span><b>- ₹${bill.discount}</b></div>
      <div class="flex justify-between"><span>GST 5%</span><b>₹${bill.gst}</b></div>
      <div class="flex justify-between text-2xl font-bold text-purple-700"><span>Total</span><span>₹${bill.total}</span></div>
    </div>`;
}

function generateBill() {
  let customerName = document.getElementById("customerName").value.trim();
  let mobile = document.getElementById("mobile").value.trim();
  let total = document.getElementById("total").innerText;
  if (cart.length === 0) { alert("Please add products first"); return; }
  if (customerName === "") { alert("Enter customer name"); return; }
  if (mobile.length !== 10 || isNaN(mobile)) { alert("Enter valid 10 digit mobile number"); return; }
  let bill = getBillData();
  renderQRBillPage(bill);
  drawQR(bill);
  sendTelegramMessage(createMessage());
  todaySales += Number(total);
  document.getElementById("salesCounter").innerText = todaySales.toFixed(2);
  document.getElementById("posPage").classList.add("hidden");
  document.getElementById("qrPage").classList.remove("hidden");
}

function backToPOS() {
  document.getElementById("qrPage").classList.add("hidden");
  document.getElementById("posPage").classList.remove("hidden");
}
function viewSavedReceipts() {
  let receipts = JSON.parse(localStorage.getItem("billdrop_customer_receipts") || "[]");

  if (receipts.length === 0) {
    alert("No receipts found");
    return;
  }

  let text = "";
  receipts.forEach((r, index) => {
    text += (index + 1) + ". " + r.receiptNumber + " - ₹" + r.total + "\n";
  });

  alert(text);
}
function saveCustomerReceiptToFirebase(bill) {
  const receiptData = { ...bill, verified: true, verifiedAt: new Date().toLocaleString() };
  let receipts = JSON.parse(localStorage.getItem("billdrop_customer_receipts") || "[]");
  receipts.push(receiptData);
  localStorage.setItem("billdrop_customer_receipts", JSON.stringify(receipts));
  if (!db) return Promise.resolve("local only");
  return db.ref("customer_receipts/" + bill.receiptNumber).set(receiptData);
}

function customerVerifyFromScan() {
  const bill = window.currentScannedBill;
  if (!bill) return;
  saveCustomerReceiptToFirebase(bill).then(() => {
    document.getElementById("customerVerifyStatus").innerHTML = "✅ Receipt verified and saved";
    document.getElementById("verifyBtn").disabled = true;
    document.getElementById("verifyBtn").innerText = "Verified";
  }).catch(error => { console.log(error); alert("Firebase save error. Check Firebase config/rules."); });
}
function openUPIPaymentFromScan() {
  const bill = window.currentScannedBill;
  if (!bill) return;

  const amount = Math.round(Number(bill.total));

  const upiLink =
    "upi://pay?pa=" + encodeURIComponent(UPI_ID) +
    "&pn=" + encodeURIComponent("AMUTHA BHARATHI") +
    "&am=" + encodeURIComponent(amount) +
    "&cu=INR" +
    "&tn=" + encodeURIComponent("BillDrop " + bill.receiptNumber);

  window.location.href = upiLink;
}


function loadCustomerScanPage() {
  const params = new URLSearchParams(window.location.search);
  const billParam = params.get("bill");
  if (!billParam) return;
  let bill;
  try { bill = JSON.parse(decodeURIComponent(billParam)); }
  catch (error) { document.body.innerHTML = "<h2 style='font-family:Arial;padding:30px;'>Invalid QR data</h2>"; return; }
  window.currentScannedBill = bill;
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("posPage").classList.add("hidden");
  document.getElementById("qrPage").classList.add("hidden");
  const customerPage = document.getElementById("customerPage");
  customerPage.classList.remove("hidden");
  customerPage.innerHTML = `
    <div class="max-w-[430px] mx-auto bg-white rounded-[32px] shadow-2xl border min-h-screen">
      <div class="bg-purple-700 text-white p-5 text-center"><h1 class="text-2xl font-extrabold">Bill Drop Pay</h1><p class="text-purple-100 text-sm">Digital Receipt Verification</p></div>
      <div class="p-6">
        <div class="text-center mb-5"><p class="text-gray-500 text-sm">Paying to</p><h2 class="text-xl font-extrabold">SUBRAMANIAN P</h2><p class="text-gray-400 text-xs">${bill.receiptNumber}</p><div class="text-4xl font-extrabold mt-4">₹${bill.total}</div><p class="text-sm text-gray-500 mt-1">${bill.paymentMode}</p></div>
        <div class="bg-gray-50 rounded-2xl p-4 mb-4 text-sm space-y-2"><div class="flex justify-between"><span>Customer</span><b>${bill.customerName}</b></div><div class="flex justify-between"><span>Mobile</span><b>${bill.mobile}</b></div><div class="flex justify-between"><span>Date</span><b>${bill.createdAt}</b></div></div>
        <h3 class="font-bold mb-3">Bill Items</h3>
        <div class="space-y-3">${bill.items.map(item => `<div class="border rounded-xl p-3"><div class="flex justify-between"><b>${item.name}</b><b>₹${item.lineTotal}</b></div><p class="text-xs text-gray-500">${item.brand} | ${item.code}</p><p class="text-xs ${item.warranty === 'No Warranty' ? 'text-gray-400' : 'text-purple-700'}">${item.warranty}</p><p class="text-xs">₹${item.price} × ${item.qty}</p></div>`).join("")}</div>
        <div class="border-t mt-5 pt-4 space-y-2"><div class="flex justify-between"><span>Subtotal</span><b>₹${bill.subtotal}</b></div><div class="flex justify-between"><span>Discount</span><b>- ₹${bill.discount}</b></div><div class="flex justify-between"><span>GST 5%</span><b>₹${bill.gst}</b></div><div class="flex justify-between text-xl font-extrabold text-purple-700"><span>Total</span><span>₹${bill.total}</span></div></div>
        <button id="verifyBtn" onclick="customerVerifyFromScan()" class="bg-purple-700 hover:bg-purple-800 text-white px-4 py-4 mt-5 w-full rounded-xl font-bold">Verify Now</button>
        <button onclick="viewSavedReceipts()" class="border border-purple-700 text-purple-700 px-4 py-4 mt-3 w-full rounded-xl font-bold">
       My Receipts
       </button>
        ${bill.paymentMode === "UPI" ? `<button onclick="openUPIPaymentFromScan()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-4 mt-3 w-full rounded-xl font-bold">Pay Now</button>` : ""}
        <p id="customerVerifyStatus" class="text-center text-green-700 font-bold mt-4"></p>
      </div>
    </div>`;
}

function sendTelegramMessage(message) {
  return fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message })
  }).then(res => res.json()).then(data => { if (!data.ok) console.log("Telegram failed: " + data.description); return data; }).catch(error => { console.log("Telegram error:", error); });
}
function drawQR(bill) {
  let canvas = document.getElementById("qr");

  let encodedBill = encodeURIComponent(JSON.stringify(bill));

  let customerLink =
  "https://asvithams.github.io/billdrop/?bill=" + encodedBill;

  QRCode.toCanvas(canvas, customerLink, { width: 220 });
}

function clearBill() {
  cart.forEach(item => {
    let product = products.find(p => p.id === item.id);
    product.stock += item.qty;
  });

  cart = [];
  document.getElementById("customerName").value = "";
  document.getElementById("mobile").value = "";
  document.getElementById("qr").classList.add("hidden");

  receiptNumber = "BDR" + new Date().getFullYear() + Math.floor(Math.random() * 9000 + 1000);
  document.getElementById("receiptNo").innerText = receiptNumber;

  renderProducts();
  renderCart();
}

loadCustomerScanPage();
renderCategories();
renderProducts();
renderCart();
</script>

</body>
</html>
